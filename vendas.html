<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendas</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { margin-bottom: 10px; }
    main { display: flex; flex-direction: column; align-items: center; }
    form { max-width: 600px; margin-bottom: 20px;}
    form > section { margin-bottom: 10px; }
    label { display: block; font-weight: bold; margin-bottom: 4px; }
    input, textarea, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .message { margin-top: 8px; color: green; }
    .error { color: red; }
    .video-area { margin-top: 20px; }
    .video-area video { width: 100%; max-width: 640px; }
    button { background-color: #007BFF; color: white; border: none; cursor: pointer; margin-bottom: 0.5rem; font-weight: 800;}
    button:hover { background-color: #0056b3; }
    .btnListar{background-color: darkcyan;}
  </style>
</head>
<body>
  <main>
    <h1>Cadastrar Venda</h1>
    <form id="vendaForm">
      <section class="row">
        <div>
          <label for="valor">Valor</label>
          <input type="number" id="valor" name="valor" step="0.01" required />
        </div>
        <div>
          <label for="mae">Mãe</label>
          <input type="text" id="mae" name="mae" required />
        </div>
      </section>
      <section class="row">
        <div>
          <label for="data">Data</label>
          <input type="date" id="data" name="data" required />
        </div>
        <div>
          <label for="local">Local</label>
          <input type="text" id="local" name="local" required />
        </div>
      </section>
      <section>
        <label for="gastos">Gastos</label>
        <input type="number" id="gastos" name="gastos" step="0.01" required />
      </section>
      <section>
        <label for="descricaoGastos">Descrição dos Gastos</label>
        <textarea id="descricaoGastos" name="descricaoGastos" rows="3"></textarea>
      </section>
      <section>
        <button type="submit" id="btnSalvar">Salvar Venda</button>
        <button type="button" id="btnListar" onclick="location.href='listarVendas.html'" class="btnListar">Listar Vendas</button>
      </section>
      <span class="message" id="mensagem"></span>
    </form>
    <script type="module" src="controler/vendas/vendas.js"></script>
  </main>
</body>
</html>
